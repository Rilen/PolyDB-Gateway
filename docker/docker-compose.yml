version: '3.8'

services:
  db_postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"

  db_mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: inventory
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  directus:
    image: directus/directus:latest
    ports:
      - "8055:8055"
    environment:
      KEY: "polydb-gateway-key-2026"
      SECRET: "polydb-gateway-secret-2026"
      DB_CLIENT: "pg"
      DB_HOST: "db_postgres"
      DB_PORT: "5432"
      DB_DATABASE: "analytics"
      DB_USER: "admin"
      DB_PASSWORD: "password"
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "admin"
      # Enable public access for demo purposes if needed
      PUBLIC_URL: "http://localhost:8055"
    depends_on:
      - db_postgres
